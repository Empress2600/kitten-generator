<!DOCTYPE html>
<html>
<head>
  <title>Kitten Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; max-width: 800px; margin: auto; padding: 15px; }
    input, select, textarea { width: 100%; margin-bottom: 10px; padding: 10px; }
    button { width: 100%; padding: 12px; margin-top: 10px; font-size: 16px; }
    textarea { height: 300px; }
  </style>
</head>

<body>

<h2>Kitten Submission Generator</h2>

<input id="name" placeholder="Name">
<input id="gender" placeholder="Gender">
<input id="color" placeholder="Fur color">
<input id="eye" placeholder="Eye color">

<input id="food" placeholder="Food brand">
<input id="specify" placeholder="Specify line">
<input id="traits" placeholder="Traits">

<input id="weight" placeholder="Weight">
<input id="dob" placeholder="Date of birth">
<input id="ready" placeholder="Ready date">

<input id="petPrice" placeholder="Pet price">
<input id="breedPrice" placeholder="Breeding price">

<h3>Mother</h3>
<select id="motherSelect" onchange="fillMother()">
  <option value="">Select Mother</option>
  <option value="blue">Blue</option>
  <option value="sapphire">Sapphire</option>
  <option value="kora">Kora</option>
  <option value="katrin">Katrin</option>
  <option value="bella">Bella</option>
  <option value="serenity">Serenity</option>
</select>

<input id="motherName" placeholder="Mother Name">
<input id="motherWeight" placeholder="Mother Weight">

<h3>Father</h3>
<select id="fatherSelect" onchange="fillFather()">
  <option value="">Select Father</option>
  <option value="max">Maximilian</option>
  <option value="ivan">Ivan</option>
</select>

<input id="fatherName" placeholder="Father Name">
<input id="fatherWeight" placeholder="Father Weight">

<button onclick="generate()">Generate</button>
<button onclick="copyText()">Copy</button>

<textarea id="output"></textarea>

<script>
function generate(){
  let name = document.getElementById("name").value;
  let gender = document.getElementById("gender").value;
  let color = document.getElementById("color").value;
  let eye = document.getElementById("eye").value;
  let food = document.getElementById("food").value;
  let specify = document.getElementById("specify").value;
  let traits = document.getElementById("traits").value;
  let weight = document.getElementById("weight").value;
  let dob = document.getElementById("dob").value;
  let ready = document.getElementById("ready").value;
  let pet = document.getElementById("petPrice").value;
  let breed = document.getElementById("breedPrice").value;
  let mom = document.getElementById("motherName").value;
  let dad = document.getElementById("fatherName").value;

  let text =
`Name: ${name}

Breed: Bengal
Gender: ${gender}
Color: ${color}
Eye: ${eye}

Food: ${food}
Specify: ${specify}

Traits: ${traits}

Weight: ${weight}
DOB: ${dob}
Ready: ${ready}

Pet: $${pet}
Breeding: $${breed}

Mother: ${mom}
Father: ${dad}`;

  document.getElementById("output").value = text;
}

function copyText(){
  let box = document.getElementById("output");
  box.select();
  document.execCommand("copy");
  alert("Copied ✅");
}

function fillMother(){
  let m = document.getElementById("motherSelect").value;

  if(m === "blue"){ motherName.value="Blue"; motherWeight.value="8";}
  if(m === "sapphire"){ motherName.value="Sapphire"; motherWeight.value="8";}
  if(m === "kora"){ motherName.value="Kora"; motherWeight.value="9";}
  if(m === "katrin"){ motherName.value="Katrin"; motherWeight.value="9";}
  if(m === "bella"){ motherName.value="Bella"; motherWeight.value="8";}
  if(m === "serenity"){ motherName.value="Serenity"; motherWeight.value="8";}
}

function fillFather(){
  let f = document.getElementById("fatherSelect").value;

  if(f === "max"){ fatherName.value="Maximilian"; fatherWeight.value="20";}
  if(f === "ivan"){ fatherName.value="Ivan"; fatherWeight.value="12";}
}
</script>

</body>
</html>
